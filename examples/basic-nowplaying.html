<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NowPlaying.WebSocket - Basic Now Playing Demo</title>

  <style>
    :root {
      --bg: #070b16;
      --panel: rgba(18, 26, 47, 0.86);
      --border: rgba(120, 150, 220, 0.18);
      --text: #e5ecff;
      --muted: #93a4c3;
      --ok: #4ade80;
      --warn: #f59e0b;
      --err: #f87171;
      --accent: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(192, 132, 252, 0.14), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Segoe UI, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(26, 38, 66, 0.9);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: rgba(42, 59, 99, 0.95);
    }

    .badge {
      color: var(--warn);
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    .state {
      color: var(--muted);
      font-size: 13px;
    }

    .ok {
      color: var(--ok);
    }

    .err {
      color: var(--err);
    }

    .player {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
    }

    .cover {
      width: 128px;
      height: 128px;
      border-radius: 16px;
      object-fit: cover;
      background: rgba(5, 9, 20, 0.55);
      border: 1px solid var(--border);
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.18;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      margin-top: 7px;
      color: var(--muted);
      font-size: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(5, 9, 20, 0.35);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .timeline {
      margin-top: 18px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 7px;
    }

    .bar {
      height: 9px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #c084fc);
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .log {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    pre {
      margin: 0;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
      color: #cdd8f8;
    }

    @media (max-width: 620px) {
      .player {
        grid-template-columns: 1fr;
      }

      .cover {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="controls">
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
      <button id="clearBtn">Clear Log</button>

      <span class="badge">ws://localhost:27871/</span>
      <span id="wsState" class="state">State: IDLE</span>
    </div>

    <section class="player">
      <img id="cover" class="cover" alt="Album art" />

      <div>
        <div id="title" class="title">Waiting for media...</div>
        <div id="artist" class="artist">Start playing something on your PC</div>

        <div class="meta">
          <span id="playback" class="pill">Playback: -</span>
          <span id="album" class="pill">Album: -</span>
          <span id="updatedAt" class="pill">Updated: -</span>
        </div>
      </div>
    </section>

    <section class="timeline">
      <div class="time-row">
        <span id="positionText">0:00</span>
        <span id="durationText">0:00</span>
      </div>

      <div class="bar">
        <div id="progressBar" class="bar-fill"></div>
      </div>
    </section>

    <section class="log">
      <pre id="logOutput">Waiting for WebSocket data...</pre>
    </section>
  </main>

  <script>
    // WebSocket endpoint provided by NowPlaying.WebSocket.
    const WS_URL = "ws://localhost:27871/";

    // Reconnect delay after an unexpected disconnect.
    const RECONNECT_MS = 1500;

    // Local fallback image used when album art is not available.
    const FALLBACK_COVER =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">
          <rect width="100%" height="100%" rx="32" fill="#111827"/>
          <circle cx="150" cy="150" r="62" fill="#1f2937"/>
          <circle cx="150" cy="150" r="20" fill="#7dd3fc"/>
          <text x="150" y="245" text-anchor="middle" fill="#93a4c3"
                font-family="Segoe UI, Arial" font-size="18">
            No Artwork
          </text>
        </svg>
      `);

    // DOM references.
    const wsState = document.getElementById("wsState");
    const logOutput = document.getElementById("logOutput");

    const cover = document.getElementById("cover");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const album = document.getElementById("album");
    const playback = document.getElementById("playback");
    const updatedAt = document.getElementById("updatedAt");

    const positionText = document.getElementById("positionText");
    const durationText = document.getElementById("durationText");
    const progressBar = document.getElementById("progressBar");

    let ws = null;
    let reconnectTimer = null;
    let manualClose = false;
    let lastAlbumArtUrl = "";

    cover.src = FALLBACK_COVER;

    // Writes a simple connection/debug log to the page.
    function log(message) {
      const time = new Date().toLocaleTimeString();
      logOutput.textContent += `\n[${time}] ${message}`;
      logOutput.scrollTop = logOutput.scrollHeight;
    }

    // Updates the visible WebSocket connection state.
    function setState(text, type) {
      wsState.textContent = `State: ${text}`;
      wsState.className = "state";

      if (type === "ok") {
        wsState.classList.add("ok");
      }

      if (type === "err") {
        wsState.classList.add("err");
      }
    }

    // Returns a safe text value for UI rendering.
    function safeText(value, fallback = "-") {
      if (value === null || value === undefined || value === "") {
        return fallback;
      }

      return String(value);
    }

    // Reads a property with multiple possible casing styles.
    function read(obj, ...keys) {
      for (const key of keys) {
        if (obj && Object.prototype.hasOwnProperty.call(obj, key)) {
          return obj[key];
        }
      }

      return undefined;
    }

    // Extracts nowPlaying data from different possible message shapes.
    function extractNowPlaying(message) {
      // Case 1:
      // { "Type": "nowPlaying", ... }
      const directType = read(message, "Type", "type");

      if (directType === "nowPlaying") {
        return message;
      }

      // Case 2:
      // { "nowPlaying": { "Type": "nowPlaying", ... } }
      const camel = read(message, "nowPlaying");

      if (camel) {
        return camel;
      }

      // Case 3:
      // { "NowPlaying": { "Type": "nowPlaying", ... } }
      const pascal = read(message, "NowPlaying");

      if (pascal) {
        return pascal;
      }

      return null;
    }

    // Updates the Now Playing UI using the received JSON object.
    function updateNowPlaying(data) {
      const trackTitle = read(data, "Title", "title");
      const trackArtist = read(data, "Artist", "artist");
      const trackAlbum = read(data, "Album", "album");
      const playbackState = read(data, "Playback", "playback");
      const isPlaying = read(data, "IsPlaying", "isPlaying");
      const posSec = Number(read(data, "PositionSec", "positionSec") || 0);
      const durSec = Number(read(data, "DurationSec", "durationSec") || 0);
      const posText = read(data, "PositionText", "positionText");
      const durText = read(data, "DurationText", "durationText");
      const updated = read(data, "UpdatedAt", "updatedAt");
      const albumArtUrl = read(data, "AlbumArtUrl", "albumArtUrl");

      title.textContent = safeText(trackTitle, "Unknown Title");
      artist.textContent = safeText(trackArtist, "Unknown Artist");
      album.textContent = `Album: ${safeText(trackAlbum)}`;
      playback.textContent = `Playback: ${safeText(playbackState)}`;
      updatedAt.textContent = `Updated: ${safeText(updated)}`;

      playback.className = "pill";

      if (isPlaying === true || playbackState === "Playing") {
        playback.classList.add("ok");
      }

      positionText.textContent = safeText(posText, "0:00");
      durationText.textContent = safeText(durText, "0:00");

      const percent = durSec > 0
        ? Math.min(100, Math.max(0, (posSec / durSec) * 100))
        : 0;

      progressBar.style.width = `${percent}%`;

      // Only update the image source when the album art URL changes.
      // This prevents unnecessary image reloads on every WebSocket message.
      if (albumArtUrl && albumArtUrl !== lastAlbumArtUrl) {
        lastAlbumArtUrl = albumArtUrl;
        cover.src = albumArtUrl;
      }

      if (!albumArtUrl) {
        lastAlbumArtUrl = "";
        cover.src = FALLBACK_COVER;
      }
    }

    // Opens the WebSocket connection.
    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        log("Already connected or connecting.");
        return;
      }

      manualClose = false;
      setState("CONNECTING", "normal");
      log(`Connecting to ${WS_URL}`);

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setState("CONNECTED", "ok");
        log("Connected.");
      };

      ws.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);

          // Show the raw received message for debugging.
          logOutput.textContent = JSON.stringify(message, null, 2);

          const nowPlaying = extractNowPlaying(message);

          if (!nowPlaying) {
            // Ignore audioVisualizer or other message types in this basic example.
            return;
          }

          updateNowPlaying(nowPlaying);
        } catch (error) {
          log(`Invalid JSON message: ${error}`);
        }
      };

      ws.onerror = () => {
        setState("ERROR", "err");
        log("WebSocket error.");
      };

      ws.onclose = (event) => {
        setState("CLOSED", "err");
        log(`Closed. code=${event.code}, reason=${event.reason || "-"}`);

        if (!manualClose) {
          scheduleReconnect();
        }
      };
    }

    // Closes the WebSocket connection manually.
    function disconnect() {
      manualClose = true;

      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      if (ws) {
        ws.close(1000, "Manual disconnect");
        ws = null;
      }

      setState("DISCONNECTED", "normal");
      log("Disconnected manually.");
    }

    // Schedules an automatic reconnect after the connection is lost.
    function scheduleReconnect() {
      if (reconnectTimer) {
        return;
      }

      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, RECONNECT_MS);
    }

    // Clears only the visible debug log.
    function clearLog() {
      logOutput.textContent = "Log cleared.";
    }

    document.getElementById("connectBtn").onclick = connect;
    document.getElementById("disconnectBtn").onclick = disconnect;
    document.getElementById("clearBtn").onclick = clearLog;

    // Auto-connect when the page opens.
    connect();
  </script>
</body>
</html>
